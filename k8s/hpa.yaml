apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pwgen-api
  labels:
    app.kubernetes.io/name: pwgen-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pwgen-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100 # allow doubling
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300 # cautious scale-down to avoid flapping
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
