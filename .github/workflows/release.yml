name: release

# Trigger only on semantic version tags like v1.2.3
on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image name and version
        id: meta
        run: |
          # Strip the leading "v" from the tag: v1.2.3 -> 1.2.3
          version="${GITHUB_REF_NAME#v}"
          # GHCR image names must be lowercase.
          image="${REGISTRY}/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "Building ${image}:${version}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Bake the tag-derived version into the binary (service.version trace attr).
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          # Only the explicit numeric version — no 1, 1.2, or latest.
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
